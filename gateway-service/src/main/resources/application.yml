server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: employee-service
          uri: http://employee:8081
          predicates:
            - Path=/employee/**
          filters:
            - StripPrefix=1
  main:
    web-application-type: reactive

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
