server:
  port: 8084

spring:
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false

    gateway:
      routes:
        - id: employee-service
          uri: http://employee:8085
          predicates:
            - Path=/employee-service/**
          filters:
            - StripPrefix=1

  main:
    web-application-type: reactive
