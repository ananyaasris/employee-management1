server:
  port: 8084
  servlet:
    context-path: /gatewayservice

spring:
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false

    gateway:
      routes:
        - id: employee-service
          uri: http://employee:8085
          predicates:
            - Path=/employee-service/**
          filters:
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,mappings
  endpoint:
    health:
      show-details: always

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
