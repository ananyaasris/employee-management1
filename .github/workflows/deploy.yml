name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2


      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2


      - name: Build Gateway Docker Image
        run: |
          docker build \
          -f gateway-service/Dockerfile \
          -t gateway-service .


      - name: Build Employee Docker Image
        run: |
          docker build \
          -f employee-service/Dockerfile \
          -t employee-service .


      - name: Tag Gateway Image
        run: |
          docker tag gateway-service:latest \
          ${{ secrets.ECR_REGISTRY }}/gateway-service:latest


      - name: Tag Employee Image
        run: |
          docker tag employee-service:latest \
          ${{ secrets.ECR_REGISTRY }}/employee-service:latest


      - name: Push Images to ECR
        run: |
          docker push ${{ secrets.ECR_REGISTRY }}/gateway-service:latest
          docker push ${{ secrets.ECR_REGISTRY }}/employee-service:latest
