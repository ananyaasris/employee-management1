name: Build and Deploy to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: gateway-service
            port: 8080
          - service: employee-service
            port: 8081
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        run: |
          cd ${{ matrix.service }}
          docker build -t 597819998313.dkr.ecr.ap-southeast-2.amazonaws.com/${{ matrix.service }}:latest .
          docker push 597819998313.dkr.ecr.ap-southeast-2.amazonaws.com/${{ matrix.service }}:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin 597819998313.dkr.ecr.ap-southeast-2.amazonaws.com
            docker pull 597819998313.dkr.ecr.ap-southeast-2.amazonaws.com/${{ matrix.service }}:latest
            docker stop ${{ matrix.service }} || true
            docker rm ${{ matrix.service }} || true
            docker run -d -p ${{ matrix.port }}:${{ matrix.port }} --restart always --name ${{ matrix.service }} 597819998313.dkr.ecr.ap-southeast-2.amazonaws.com/${{ matrix.service }}:latest
