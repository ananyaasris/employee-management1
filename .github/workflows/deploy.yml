name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2
  ECR_REGISTRY: 597819998313.dkr.ecr.ap-southeast-2.amazonaws.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push Gateway Service
      run: |
        cd gateway-service
        docker build -t ${{ env.ECR_REGISTRY }}/gateway-service:latest .
        docker push ${{ env.ECR_REGISTRY }}/gateway-service:latest

    - name: Build and Push Employee Service
      run: |
        cd employee-service
        docker build -t ${{ env.ECR_REGISTRY }}/employee-service:latest .
        docker push ${{ env.ECR_REGISTRY }}/employee-service:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "Logging into ECR..."
          aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin 597819998313.dkr.ecr.ap-southeast-2.amazonaws.com
          
          echo "Pulling latest images..."
          docker pull 597819998313.dkr.ecr.ap-southeast-2.amazonaws.com/gateway-service:latest
          docker pull 597819998313.dkr.ecr.ap-southeast-2.amazonaws.com/employee-service:latest
          
          echo "Stopping old containers..."
          docker stop gateway-service || true
          docker rm gateway-service || true
          docker stop employee-service || true
          docker rm employee-service || true
          
          echo "Starting gateway-service on port 8080..."
          docker run -d \
            -p 8080:8080 \
            --restart always \
            --name gateway-service \
            597819998313.dkr.ecr.ap-southeast-2.amazonaws.com/gateway-service:latest
          
          echo "Starting employee-service on port 8081..."
          docker run -d \
            -p 8081:8081 \
            --restart always \
            --name employee-service \
            597819998313.dkr.ecr.ap-southeast-2.amazonaws.com/employee-service:latest
          
          echo "Deployment complete!"
          docker ps
