name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-2


    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2


    # Build Gateway
    - name: Build Gateway Docker Image
      run: |
        docker build -t gateway-service:latest -f gateway-service/Dockerfile .


    # Build Employee
    - name: Build Employee Docker Image
      run: |
        docker build -t employee-service:latest -f employee-service/Dockerfile .


    # Tag Images
    - name: Tag Images
      run: |
        docker tag gateway-service:latest \
        ${{ secrets.ECR_REGISTRY }}/gateway-service:latest

        docker tag employee-service:latest \
        ${{ secrets.ECR_REGISTRY }}/employee-service:latest


    # Push Images
    - name: Push Images to ECR
      run: |
        docker push ${{ secrets.ECR_REGISTRY }}/gateway-service:latest
        docker push ${{ secrets.ECR_REGISTRY }}/employee-service:latest


    # Deploy EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd petclinic-microservices

          docker compose pull

          docker compose down

          docker compose up -d
