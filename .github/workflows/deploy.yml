name: Build and Deploy to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway-service, employee-service]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: 597819998313.dkr.ecr.ap-southeast-2.amazonaws.com
          ECR_REPOSITORY: ${{ matrix.service }}
          IMAGE_TAG: latest
        run: |
          cd ${{ matrix.service }}
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR on EC2
            aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin 597819998313.dkr.ecr.ap-southeast-2.amazonaws.com
            
            # Pull latest image
            docker pull 597819998313.dkr.ecr.ap-southeast-2.amazonaws.com/${{ matrix.service }}:latest
            
            # Stop and remove old container
            docker stop ${{ matrix.service }} || true
            docker rm ${{ matrix.service }} || true
            
            # Run new container - Gateway on 8080, Employee on 8081
            if [ "${{ matrix.service }}" == "gateway-service" ]; then
              docker run -d -p 8080:8080 --restart always --name ${{ matrix.service }} 597819998313.dkr.ecr.ap-southeast-2.amazonaws.com/${{ matrix.service }}:latest
            else
              docker run -d -p 8081:8081 --restart always --name ${{ matrix.service }} 597819998313.dkr.ecr.ap-southeast-2.amazonaws.com/${{ matrix.service }}:latest
            fi
