name: Build and Push Docker Images to Amazon ECR

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Maven Project
        run: mvn clean package -DskipTests

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Config Service
        run: |
          docker build -t $ECR_REGISTRY/config-service:latest ./config-service
          docker push $ECR_REGISTRY/config-service:latest

      - name: Build and Push Discovery Service
        run: |
          docker build -t $ECR_REGISTRY/discovery-service:latest ./discovery-service
          docker push $ECR_REGISTRY/discovery-service:latest

      - name: Build and Push Employee Service
        run: |
          docker build -t $ECR_REGISTRY/employee-service:latest ./employee-service
          docker push $ECR_REGISTRY/employee-service:latest
