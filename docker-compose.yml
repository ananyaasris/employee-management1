version: '3.8'
services:
  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "80:8080"   
    depends_on:
      - employee
    networks:
      - app-network

  employee:
    build: ./employee-service
    container_name: employee
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
